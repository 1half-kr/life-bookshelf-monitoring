name: Deploy Monitoring Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 서버별 SSH 키 설정 (민감 정보는 GitHub Secrets에서 관리)
      - name: Setup SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MONITORING_SSH_KEY }}" > ~/.ssh/monitoring_key
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          echo "${{ secrets.AI_SSH_KEY }}" > ~/.ssh/ai_key
          chmod 600 ~/.ssh/monitoring_key ~/.ssh/server_key ~/.ssh/ai_key

      # IP/키 경로를 Secrets에서 읽어 inventory 동적 생성
      - name: Generate inventory from secrets
        env:
          MONITORING_HOST: ${{ secrets.MONITORING_HOST }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          AI_HOST: ${{ secrets.AI_HOST }}
          MONITORING_SSH_KEY_PATH: ~/.ssh/monitoring_key
          SERVER_SSH_KEY_PATH: ~/.ssh/server_key
          AI_SSH_KEY_PATH: ~/.ssh/ai_key
        run: envsubst < inventory/hosts.yml.template > inventory/hosts.yml

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Deploy with Ansible
        run: ansible-playbook playbook.yml
